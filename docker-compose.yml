services:
  web:
    image: php:8.2-apache
    ports:
      - "8081:80"
    volumes:
      - .:/var/www/html
      - ./apache/000-default.conf:/etc/apache2/sites-available/000-default.conf
    command: >
      bash -c "a2enmod rewrite headers expires deflate
      && apache2-foreground"
    restart: unless-stopped
